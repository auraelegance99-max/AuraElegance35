    <script>
        const ADMIN_CODE = '123456';
        let nextProductId = 1;
        let products = [];
        let cart = [];
        let orders = [];
        let reviews = [];
        let announcementSettings = { enabled: false, text: '', speed: 20 };
        let currentCategory = 'all';
        let searchQuery = '';
        let deleteTargetId = null;

        // ============ جلب البيانات من السيرفر ============
        async function loadProductsFromServer() {
            try {
                const response = await fetch('/api/products');
                if (!response.ok) throw new Error('Network response was not ok');
                products = await response.json();
                renderProducts();
                if (typeof renderAdminProducts === 'function') {
                    renderAdminProducts(); 
                }
                updateStats();
            } catch (error) {
                console.error("خطأ في جلب المنتجات:", error);
            }
        }

        async function loadReviewsFromServer() {
            try {
                const response = await fetch('/api/reviews');
                if (!response.ok) throw new Error('Network response was not ok');
                reviews = await response.json();
                renderReviews();
                renderAdminReviews();
                updateStats();
            } catch (error) {
                console.error("خطأ في جلب الآراء:", error);
            }
        }

        // تعديل حدث الاستماع عند تحميل الصفحة بالكامل
        document.addEventListener('DOMContentLoaded', () => {
            loadProductsFromServer();
            loadReviewsFromServer();
            loadAnnouncement();
            setupRevealAnimations();
            setupForms();
        });

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            if (pageId === 'admin') { updateStats(); renderAdminProducts(); renderAdminOrders(); renderAdminReviews(); loadAnnouncementForm(); }
            closeMobileMenu();
            window.scrollTo(0, 0);
        }
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('hidden'); }
        function closeMobileMenu() { document.getElementById('mobile-menu').classList.add('hidden'); }

        // ============ البحث ============
        function handleSearch(value) {
            searchQuery = value.trim();
            const clearBtn = document.getElementById('search-clear');
            if (searchQuery.length > 0) clearBtn.classList.add('visible');
            else clearBtn.classList.remove('visible');
            renderProducts();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            document.getElementById('search-clear').classList.remove('visible');
            document.getElementById('search-result-count').textContent = '';
            renderProducts();
        }

        // ============ عرض المنتجات للمتجر مع البحث ============
        function getCategoryName(cat) {
            const names = { perfume: 'عطور', cosmetics: 'مستحضرات تجميل', bags: 'مراهل' };
            return names[cat] || cat;
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const resultCount = document.getElementById('search-result-count');
            let filtered = currentCategory === 'all' ? products : products.filter(p => p.category === currentCategory);

            if (searchQuery.length > 0) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(query) ||
                    getCategoryName(p.category).toLowerCase().includes(query) ||
                    (p.description && p.description.toLowerCase().includes(query))
                );
            }

            if (searchQuery.length > 0) resultCount.textContent = `تم العثور على ${filtered.length} منتج`;
            else resultCount.textContent = '';

            if (filtered.length === 0) {
                if (products.length === 0) {
                    grid.innerHTML = '<div class="col-span-full empty-state"><div class="empty-state-icon"><svg class="w-12 h-12 text-gold-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p class="text-gold-200/50 font-body text-lg">لا توجد منتجات بعد</p><p class="text-gold-200/30 font-body text-sm mt-2">قومي بإضافة منتجات من لوحة التحكم</p></div>';
                } else {
                    grid.innerHTML = '<div class="col-span-full empty-state"><div class="empty-state-icon"><svg class="w-12 h-12 text-gold-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div><p class="text-gold-200/50 font-body text-lg">لا توجد نتائج مطابقة للبحث</p><p class="text-gold-200/30 font-body text-sm mt-2">جربي كلمات بحث أخرى</p></div>';
                }
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card glass rounded-2xl overflow-hidden group">
                    <div class="relative overflow-hidden aspect-square">
                        <img src="${p.image}" alt="${p.name}" class="product-image w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <button onclick="addToCart(${p.id})" class="absolute bottom-4 left-4 right-4 btn-gold bg-gold-500 text-obsidian-900 font-bold py-3 rounded-xl opacity-0 group-hover:opacity-100 transform translate-y-4 group-hover:translate-y-0 transition-all duration-300">أضيفي للسلة</button>
                    </div>
                    <div class="p-5">
                        <h4 class="font-display text-lg font-semibold text-white mb-1">${p.name}</h4>
                        <p class="text-gold-200/50 text-sm font-body line-clamp-2">${p.description || ''}</p>
                        <span class="inline-block mt-3 text-xs px-3 py-1 rounded-full bg-gold-500/10 text-gold-400">${getCategoryName(p.category)}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderProducts();
            document.getElementById('products')?.scrollIntoView({ behavior: 'smooth' });
        }

        // ============ لوحة التحكم - المنتجات ============
        function renderAdminProducts() {
            const container = document.getElementById('admin-products-list');
            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg class="w-12 h-12 text-gold-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><p class="text-gold-200/50 font-body text-lg">لا توجد منتجات بعد</p><p class="text-gold-200/30 font-body text-sm mt-2">اضغطي على "إضافة منتج" للبدء</p></div>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="admin-product-row glass rounded-xl p-4 flex flex-col sm:flex-row items-start sm:items-center gap-4" data-id="${p.id}">
                    <img src="${p.image}" alt="${p.name}" class="w-16 h-16 rounded-xl object-cover border border-gold-900/30 flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-display text-lg font-semibold text-white truncate">${p.name}</h4>
                        <p class="text-gold-200/50 text-sm font-body">${getCategoryName(p.category)}</p>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <button onclick="editProduct(${p.id})" class="inline-flex items-center gap-2 bg-gold-500/10 border border-gold-500/30 text-gold-400 font-medium px-4 py-2 rounded-xl hover:bg-gold-500/20 transition-all text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            تعديل
                        </button>
                        <button onclick="confirmDeleteProduct(${p.id})" class="inline-flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 font-medium px-4 py-2 rounded-xl hover:bg-red-500/20 transition-all text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            حذف
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openAddProductModal() {
            document.getElementById('product-modal-title').textContent = 'إضافة منتج جديد';
            document.getElementById('product-id').value = '';
            document.getElementById('product-name').value = '';
            document.getElementById('product-category').value = 'perfume';
            document.getElementById('product-description').value = '';
            document.getElementById('product-image-data').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('no-image-text').classList.remove('hidden');
            document.getElementById('product-modal').classList.add('active');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            document.getElementById('product-modal-title').textContent = 'تعديل المنتج';
            document.getElementById('product-id').value = product.id;
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-category').value = product.category;
            document.getElementById('product-description').value = product.description || '';
            document.getElementById('product-image-data').value = product.image || '';
            const preview = document.getElementById('image-preview');
            const noImg = document.getElementById('no-image-text');
            if (product.image) { preview.src = product.image; preview.classList.remove('hidden'); noImg.classList.add('hidden'); }
            else { preview.classList.add('hidden'); noImg.classList.remove('hidden'); }
            document.getElementById('product-modal').classList.add('active');
        }

        function closeProductModal() { document.getElementById('product-modal').classList.remove('active'); }

        function confirmDeleteProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            deleteTargetId = id;
            document.getElementById('delete-confirm-text').textContent = `هل أنت متأكد من حذف "${product.name}"؟ لا يمكن التراجع عن هذا الإجراء.`;
            document.getElementById('delete-confirm-modal').classList.add('active');
        }

        function closeDeleteConfirm() { document.getElementById('delete-confirm-modal').classList.remove('active'); deleteTargetId = null; }

        // ============ دالة حذف المنتج (محدثة للاتصال بالسيرفر) ============
        async function executeDelete() {
            if (deleteTargetId === null) return;
            const deletedId = deleteTargetId;
            try {
                const response = await fetch(`/api/products/${deletedId}`, { method: 'DELETE' });
                if (response.ok) {
                    document.getElementById('delete-confirm-modal').classList.remove('active');
                    deleteTargetId = null;
                    showToast('تم حذف المنتج بنجاح من قاعدة البيانات');
                    loadProductsFromServer();
                } else {
                    showToast('فشل حذف المنتج');
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر');
            }
        }

        function handleImageUpload(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('product-image-data').value = e.target.result;
                const preview = document.getElementById('image-preview');
                preview.src = e.target.result; preview.classList.remove('hidden');
                document.getElementById('no-image-text').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function updateStats() {
            document.getElementById('total-products').textContent = products.length;
            document.getElementById('pending-orders-count').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('reviews-count').textContent = reviews.length;
        }

        // ============ السلة ============
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            const existing = cart.find(c => c.productId === productId);
            if (existing) existing.quantity++; else cart.push({ productId, quantity: 1 });
            updateCartCount();
            showToast(`تمت إضافة "${product.name}" إلى السلة`);
        }

        function removeFromCart(productId) { cart = cart.filter(c => c.productId !== productId); updateCartCount(); renderCartItems(); }
        function updateCartCount() { document.getElementById('cart-count').textContent = cart.reduce((s, c) => s + c.quantity, 0); }
        function openCart() { renderCartItems(); document.getElementById('cart-modal').classList.add('active'); }
        function closeCart() { document.getElementById('cart-modal').classList.remove('active'); }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center py-8"><p class="text-gold-200/50 font-body">السلة فارغة</p></div>';
                document.getElementById('checkout-btn').disabled = true; return;
            }
            document.getElementById('checkout-btn').disabled = false;
            container.innerHTML = cart.map(item => {
                const p = products.find(pr => pr.id === item.productId);
                if (!p) return '';
                return `<div class="flex items-center gap-4 bg-obsidian-300/30 rounded-xl p-4">
                    <img src="${p.image}" class="w-14 h-14 rounded-lg object-cover border border-gold-900/30">
                    <div class="flex-1"><h4 class="text-white font-medium text-sm">${p.name}</h4><p class="text-gold-200/50 text-xs">الكمية: ${item.quantity}</p></div>
                    <button onclick="removeFromCart(${p.id})" class="p-2 text-red-400 hover:text-red-300 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`;
            }).join('');
        }

        function openCheckoutModal() {
            if (cart.length === 0) return; closeCart();
            const summary = document.getElementById('checkout-summary');
            summary.innerHTML = cart.map(item => {
                const p = products.find(pr => pr.id === item.productId);
                return p ? `<div class="flex justify-between text-sm"><span class="text-gold-200/70">${p.name} × ${item.quantity}</span></div>` : '';
            }).join('');
            document.getElementById('checkout-modal').classList.add('active');
        }
        function closeCheckoutModal() { document.getElementById('checkout-modal').classList.remove('active'); }

        // ============ الطلبات ============
        function renderAdminOrders() {
            const container = document.getElementById('admin-orders-list');
            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg class="w-12 h-12 text-gold-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div><p class="text-gold-200/50 font-body text-lg">لا توجد طلبات بعد</p></div>';
                return;
            }
            const statusMap = { pending: 'معلق', processing: 'قيد التنفيذ', shipped: 'تم الشحن', delivered: 'تم التوصيل' };
            container.innerHTML = orders.map(o => `
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-4"><h4 class="text-white font-semibold">طلب #${o.id}</h4><span class="status-${o.status} text-xs px-3 py-1 rounded-full">${statusMap[o.status]}</span></div>
                    <p class="text-gold-200/50 text-sm mb-2">${o.customerName} - ${o.phone}</p>
                    <p class="text-gold-200/50 text-sm mb-4">${o.address}</p>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="updateOrderStatus(${o.id},'processing')" class="text-xs px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 transition-all">قيد التنفيذ</button>
                        <button onclick="updateOrderStatus(${o.id},'shipped')" class="text-xs px-3 py-1 rounded-full bg-purple-500/10 text-purple-400 hover:bg-purple-500/20 transition-all">تم الشحن</button>
                        <button onclick="updateOrderStatus(${o.id},'delivered')" class="text-xs px-3 py-1 rounded-full bg-green-500/10 text-green-400 hover:bg-green-500/20 transition-all">تم التوصيل</button>
                    </div>
                </div>`).join('');
        }

        function updateOrderStatus(orderId, status) {
            const order = orders.find(o => o.id === orderId);
            if (order) { order.status = status; renderAdminOrders(); updateStats(); showToast('تم تحديث حالة الطلب'); }
        }

        // ============ الآراء ============
        function renderReviews() {
            const container = document.getElementById('reviews-list');
            if (reviews.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-8"><p class="text-gold-200/50 font-body">لا توجد آراء بعد. كوني أول من يشارك رأيها!</p></div>';
                return;
            }
            container.innerHTML = reviews.map(r => `
                <div class="glass rounded-2xl p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gold-500/20 flex items-center justify-center text-gold-400 font-bold">${r.name.charAt(0)}</div>
                        <div><h4 class="text-white font-medium text-sm">${r.name}</h4><div class="text-gold-400 text-xs">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div>
                    </div>
                    <p class="text-gold-200/60 text-sm font-body">${r.text}</p>
                </div>`).join('');
        }

        function renderAdminReviews() {
            const container = document.getElementById('admin-reviews-list');
            if (reviews.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg class="w-12 h-12 text-gold-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div><p class="text-gold-200/50 font-body text-lg">لا توجد تعليقات بعد</p></div>';
                return;
            }
            container.innerHTML = reviews.map((r, i) => `
                <div class="glass rounded-xl p-6 flex items-start gap-4">
                    <div class="w-10 h-10 rounded-full bg-gold-500/20 flex items-center justify-center text-gold-400 font-bold flex-shrink-0">${r.name.charAt(0)}</div>
                    <div class="flex-1"><div class="flex items-center gap-2 mb-2"><h4 class="text-white font-medium">${r.name}</h4><span class="text-gold-400 text-xs">${'★'.repeat(r.rating)}</span></div><p class="text-gold-200/60 text-sm font-body">${r.text}</p></div>
                    <button onclick="deleteReview(${i})" class="p-2 text-red-400 hover:text-red-300 transition-colors flex-shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                </div>`).join('');
        }

        function deleteReview(index) { reviews.splice(index, 1); renderReviews(); renderAdminReviews(); updateStats(); showToast('تم حذف التعليق'); }

        // ============ الإعلانات ============
        function loadAnnouncement() { try { const s = localStorage.getItem('aura_announcement'); if (s) announcementSettings = JSON.parse(s); } catch(e){} applyAnnouncement(); }
        function loadAnnouncementForm() { document.getElementById('announcement-enabled').checked = announcementSettings.enabled; document.getElementById('announcement-text').value = announcementSettings.text || ''; document.getElementById('announcement-speed').value = announcementSettings.speed || 20; }
        function saveAnnouncement() { announcementSettings.enabled = document.getElementById('announcement-enabled').checked; announcementSettings.text = document.getElementById('announcement-text').value; announcementSettings.speed = parseInt(document.getElementById('announcement-speed').value) || 20; localStorage.setItem('aura_announcement', JSON.stringify(announcementSettings)); applyAnnouncement(); showToast('تم حفظ الإعلان'); }
        function resetAnnouncement() { announcementSettings = { enabled: false, text: '', speed: 20 }; localStorage.setItem('aura_announcement', JSON.stringify(announcementSettings)); loadAnnouncementForm(); applyAnnouncement(); showToast('تم إعادة تعيين الإعلان'); }
        function applyAnnouncement() {
            const banner = document.getElementById('announcement-banner'), content = document.getElementById('banner-content');
            if (announcementSettings.enabled && announcementSettings.text) { content.innerHTML = `<span>${announcementSettings.text}</span>`; content.style.animationDuration = announcementSettings.speed + 's'; banner.classList.remove('hidden'); document.body.classList.add('has-banner'); }
            else { banner.classList.add('hidden'); document.body.classList.remove('has-banner'); }
        }

        // ============ التبويبات ============
        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active', 'text-white'); b.classList.add('text-gold-200/70'); });
            const ab = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
            if (ab) { ab.classList.add('active', 'text-white'); ab.classList.remove('text-gold-200/70'); }
        }

        function showToast(message) {
            const t = document.getElementById('success-toast');
            document.getElementById('toast-message').textContent = message;
            t.classList.remove('translate-y-full', 'opacity-0'); t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.add('translate-y-full', 'opacity-0'); t.classList.remove('translate-y-0', 'opacity-100'); }, 3000);
        }

        // ============ إعداد النماذج (محدثة للإرسال للسيرفر) ============
        function setupForms() {
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                if (document.getElementById('login-code').value === ADMIN_CODE) { document.getElementById('login-error').classList.add('hidden'); showPage('admin'); }
                else document.getElementById('login-error').classList.remove('hidden');
            });

            // إضافة / تعديل منتج
            document.getElementById('product-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const id = document.getElementById('product-id').value;
                const name = document.getElementById('product-name').value.trim();
                const category = document.getElementById('product-category').value;
                const description = document.getElementById('product-description').value.trim();
                const imageInput = document.getElementById('product-image-file');
                const oldImageData = document.getElementById('product-image-data').value;
                
                if (!name) { showToast('الرجاء إدخال اسم المنتج'); return; }
                
                const formData = new FormData();
                formData.append('name', name);
                formData.append('category', category);
                formData.append('description', description);
                
                if (imageInput.files[0]) {
                    formData.append('image', imageInput.files[0]);
                } else if (oldImageData) {
                    formData.append('existingImage', oldImageData);
                }

                try {
                    const url = id ? `/api/products/${id}` : '/api/products';
                    const method = id ? 'PUT' : 'POST';
                    
                    const response = await fetch(url, { method, body: formData });
                    
                    if (response.ok) {
                        showToast(id ? 'تم تعديل المنتج بنجاح!' : 'تم إضافة المنتج بنجاح وثباته في السيرفر!');
                        this.reset();
                        document.getElementById('product-image-data').value = '';
                        const preview = document.getElementById('image-preview');
                        if(preview) preview.classList.add('hidden');
                        document.getElementById('no-image-text')?.classList.remove('hidden');
                        closeProductModal();
                        loadProductsFromServer();
                    } else {
                        const err = await response.json();
                        showToast(err.error || 'حدث خطأ أثناء العملية');
                    }
                } catch (error) {
                    showToast('فشل الاتصال بالسيرفر');
                }
            });

            // إضافة رأي
            document.getElementById('review-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const name = document.getElementById('reviewer-name').value.trim();
                const text = document.getElementById('review-text').value.trim();
                const ratingEl = document.querySelector('input[name="rating"]:checked');
                const rating = ratingEl ? parseInt(ratingEl.value) : 5;
                
                if (!name || !text) { showToast('الرجاء تعبئة جميع الحقول'); return; }
                
                try {
                    const response = await fetch('/api/reviews', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, rating, text })
                    });
                    
                    if (response.ok) {
                        showToast('شكراً لك! تم نشر تعليقك للجميع بنجاح');
                        this.reset();
                        document.querySelector('#star3').checked = true;
                        loadReviewsFromServer();
                    } else {
                        showToast('فشل إرسال رأيك');
                    }
                } catch (error) {
                    showToast('فشل الاتصال بالسيرفر');
                }
            });

            document.getElementById('checkout-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const fn = document.getElementById('checkout-first-name').value.trim();
                const ln = document.getElementById('checkout-last-name').value.trim();
                const ph = document.getElementById('checkout-phone').value.trim();
                const addr = document.getElementById('checkout-address').value.trim();
                if (!fn || !ln || !ph || !addr) { showToast('الرجاء تعبئة جميع الحقول'); return; }
                orders.push({ id: Date.now(), customerName: fn + ' ' + ln, phone: ph, address: addr, items: [...cart], status: 'pending', date: new Date().toISOString() });
                cart = []; updateCartCount(); closeCheckoutModal(); this.reset();
                showToast('تم تأكيد الطلب بنجاح!');
            });

            document.getElementById('contact-form').addEventListener('submit', function(e) { e.preventDefault(); showToast('تم إرسال رسالتك بنجاح!'); this.reset(); });
            document.getElementById('announcement-form').addEventListener('submit', function(e) { e.preventDefault(); saveAnnouncement(); });
        }

        function setupRevealAnimations() {
            const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }
    </script>
